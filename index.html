<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Globe 3D - Voyages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CesiumJS -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>

    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .popup-img {
            width: 100%;
            border-radius: 6px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div id="cesiumContainer"></div>

<script>
// ---------------------------------------------------
// 🔑 TA CLÉ CESIUM ION
// ---------------------------------------------------
Cesium.Ion.defaultAccessToken = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJjNTQ5YjU4ZC01NTRhLTQyMTUtYTA0ZS03ZDJhNGY4NDhlNjYiLCJpZCI6NDI4ODQ0LCJpc3MiOiJodHRwczovL2lvbi5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3NzgyMzg5ODF9.kHnqmrD5om952taZbrX2YAUW8ACBpKuX6BsxrdfzW2g
    ;

// ---------------------------------------------------
// 📌 COLLE ICI LE CODE COMPLET GÉNÉRÉ PAR generator.html
// ---------------------------------------------------
const voyages = [
    // Exemple :
    // {
    //     "titre": "Voyage en Polynésie 2025",
    //     "etapes": [
    //         {
    //             "nom": "Genève Aéroport",
    //             "typeEtape": "depart",
    //             "transport": "avion",
    //             "lon": 6.110271,
    //             "lat": 46.231334,
    //             "lien": "https://www.gva.ch",
    //             "photo": "https://...",
    //             "couleur": "#3498db",
    //             "hauteurArc": 400000
    //         }
    //     ]
    // }
];

// ---------------------------------------------------
// 🌍 Initialisation du globe 3D
// ---------------------------------------------------
const viewer = new Cesium.Viewer("cesiumContainer", {
    terrain: Cesium.Terrain.fromWorldTerrain(),
    sceneMode: Cesium.SceneMode.SCENE3D,
    scene3DOnly: true,
    animation: false,
    timeline: false,
    geocoder: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    baseLayerPicker: true
});

// ---------------------------------------------------
// 🎨 Styles pour les types d'étapes
// ---------------------------------------------------
const styleEtapes = {
    depart: Cesium.Color.LIME.withAlpha(0.95),
    escale: Cesium.Color.CYAN.withAlpha(0.95),
    etape: Cesium.Color.RED.withAlpha(0.95),
    arrivee: Cesium.Color.ORANGE.withAlpha(0.95)
};

// ---------------------------------------------------
// ✈️ Fonction pour créer un arc 3D entre deux points
// ---------------------------------------------------
function arc3D(lon1, lat1, lon2, lat2, hauteur) {
    const p1 = Cesium.Cartesian3.fromDegrees(lon1, lat1);
    const p2 = Cesium.Cartesian3.fromDegrees(lon2, lat2);

    const cartesians = [];
    const steps = 64;

    for (let i = 0; i <= steps; i++) {
        const t = i / steps;

        const cart = Cesium.Cartesian3.lerp(p1, p2, t, new Cesium.Cartesian3());
        const carto = Cesium.Cartographic.fromCartesian(cart);

        carto.height = Math.sin(Math.PI * t) * hauteur;

        cartesians.push(
            Cesium.Cartesian3.fromRadians(
                carto.longitude,
                carto.latitude,
                carto.height
            )
        );
    }

    return cartesians;
}

// ---------------------------------------------------
// 🧭 Ajout d’un voyage (compatible générateur)
// ---------------------------------------------------
function ajouterVoyage(voyage) {
    let last = null;

    voyage.etapes.forEach((etape, index) => {
        const lon = etape.lon;
        const lat = etape.lat;

        const pos = Cesium.Cartesian3.fromDegrees(lon, lat, 2000);

        const colorPoint =
            styleEtapes[etape.typeEtape] || Cesium.Color.WHITE.withAlpha(0.9);

        viewer.entities.add({
            position: pos,
            point: {
                pixelSize: 12,
                color: colorPoint,
                outlineColor: Cesium.Color.WHITE,
                outlineWidth: 2
            },
            label: {
                text: etape.nom,
                font: "14px sans-serif",
                fillColor: Cesium.Color.WHITE,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -18),
                disableDepthTestDistance: Number.POSITIVE_INFINITY
            },
            description: `
                <img src="${etape.photo}" class="popup-img">
                <h3>${voyage.titre}</h3>
                <p><b>Étape :</b> ${etape.nom}</p>
                <p><b>Type d'étape :</b> ${etape.typeEtape}</p>
                <p><b>Transport :</b> ${etape.transport}</p>
                <p><a href="${etape.lien}" target="_blank">Ouvrir le lien externe</a></p>
            `
        });

        if (last) {
            const hauteur = etape.hauteurArc || 200000;
            const arc = arc3D(last.lon, last.lat, lon, lat, hauteur);

            const couleurLigne = Cesium.Color.fromCssColorString(
                etape.couleur || "#ffffff"
            );

            viewer.entities.add({
                polyline: {
                    positions: arc,
                    width: 3,
                    clampToGround: false,
                    material: new Cesium.PolylineGlowMaterialProperty({
                        glowPower: 0.2,
                        color: couleurLigne
                    })
                }
            });
        }

        last = { lon, lat };
    });
}

// ---------------------------------------------------
// ➕ Ajout de tous les voyages
// ---------------------------------------------------
voyages.forEach(ajouterVoyage);

// ---------------------------------------------------
// 🔍 Zoom automatique
// ---------------------------------------------------
viewer.zoomTo(viewer.entities);
</script>

</body>
</html>
