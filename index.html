<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte OpenLayers - Voyages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- OpenLayers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.1.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v9.1.0/dist/ol.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .ol-popup {
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            min-width: 150px;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>
    // -----------------------------
    // 1) Initialisation de la carte
    // -----------------------------
    const map = new ol.Map({
        target: 'map',
        layers: [
            new ol.layer.Tile({
                source: new ol.source.OSM()
            })
        ],
        view: new ol.View({
            center: ol.proj.fromLonLat([0, 20]),
            zoom: 2
        })
    });

    // -----------------------------
    // 2) Styles des points
    // -----------------------------
    const styleDepart = new ol.style.Style({
        image: new ol.style.Circle({
            radius: 8,
            fill: new ol.style.Fill({ color: '#2ecc71' }),
            stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
        })
    });

    const styleEtape = new ol.style.Style({
        image: new ol.style.Circle({
            radius: 6,
            fill: new ol.style.Fill({ color: '#e74c3c' }),
            stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
        })
    });

    // -----------------------------
    // 3) TABLEAU DES VOYAGES
    //    → Tu peux en mettre 20, 30, 50…
    // -----------------------------
    const voyages = [
        // --- Exemple 1 ---
        {
            nom: "Italie 2022",
            couleur: "#e63946",
            etapes: [
                { nom: "Lausanne (Départ)", coords: [6.6323, 46.5197] },
                { nom: "Milan", coords: [9.19, 45.4642] },
                { nom: "Florence", coords: [11.2558, 43.7696] },
                { nom: "Rome", coords: [12.4964, 41.9028] }
            ]
        },

        // --- Exemple 2 ---
        {
            nom: "Portugal 2023",
            couleur: "#1d3557",
            etapes: [
                { nom: "Genève (Départ)", coords: [6.1432, 46.2044] },
                { nom: "Porto", coords: [-8.6291, 41.1579] },
                { nom: "Lisbonne", coords: [-9.1393, 38.7223] }
            ]
        },

        // --- Tu peux ajouter ici jusqu'à 20 voyages ---
        // Copie-colle ce bloc :
        /*
        {
            nom: "Nom du voyage",
            couleur: "#HEX",
            etapes: [
                { nom: "Départ", coords: [lon, lat] },
                { nom: "Étape 2", coords: [lon, lat] },
                { nom: "Étape 3", coords: [lon, lat] }
            ]
        },
        */
    ];

    // -----------------------------
    // 4) Ajout des voyages
    // -----------------------------
    voyages.forEach(voyage => {
        const features = [];
        const lineCoords = [];

        voyage.etapes.forEach((etape, index) => {
            const point = new ol.Feature({
                geometry: new ol.geom.Point(ol.proj.fromLonLat(etape.coords)),
                name: etape.nom,
                voyage: voyage.nom
            });

            point.setStyle(index === 0 ? styleDepart : styleEtape);

            features.push(point);
            lineCoords.push(ol.proj.fromLonLat(etape.coords));
        });

        const line = new ol.Feature({
            geometry: new ol.geom.LineString(lineCoords)
        });

        line.setStyle(new ol.style.Style({
            stroke: new ol.style.Stroke({
                color: voyage.couleur,
                width: 3
            })
        }));

        features.push(line);

        const layer = new ol.layer.Vector({
            source: new ol.source.Vector({
                features: features
            })
        });

        map.addLayer(layer);
    });

    // -----------------------------
    // 5) Popup au clic
    // -----------------------------
    const popup = document.createElement('div');
    popup.className = 'ol-popup';
    const overlay = new ol.Overlay({
        element: popup,
        positioning: 'bottom-center',
        stopEvent: false
    });
    map.addOverlay(overlay);

    map.on('click', function (evt) {
        const feature = map.forEachFeatureAtPixel(evt.pixel, f => f);
        if (feature && feature.get('name')) {
            popup.innerHTML = `<b>${feature.get('voyage')}</b><br>${feature.get('name')}`;
            overlay.setPosition(evt.coordinate);
        }
    });
</script>

</body>
</html>
