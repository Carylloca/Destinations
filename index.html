<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Destinations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100vh;
        }

        /* Icône départ (vert) */
        .start-icon {
            background-color: #2ecc71;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: block;
            border: 2px solid white;
        }

        /* Icône étape (rouge) */
        .step-icon {
            background-color: #e74c3c;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: block;
            border: 2px solid white;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>
    // Initialisation de la carte
    const map = L.map('map').setView([20, 0], 2);

    // Fond de carte moderne
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Icônes personnalisées
    const startIcon = L.divIcon({ className: 'start-icon', iconSize: [16, 16] });
    const stepIcon = L.divIcon({ className: 'step-icon', iconSize: [14, 14] });

    // Exemple de voyages
    const voyages = [
        {
            nom: "Italie 2022",
            couleur: "#e63946",
            etapes: [
                { nom: "Lausanne (Départ)", coords: [46.5197, 6.6323] },
                { nom: "Milan", coords: [45.4642, 9.19] },
                { nom: "Florence", coords: [43.7696, 11.2558] },
                { nom: "Rome", coords: [41.9028, 12.4964] }
            ]
        },
        {
            nom: "Portugal 2023",
            couleur: "#1d3557",
            etapes: [
                { nom: "Genève (Départ)", coords: [46.2044, 6.1432] },
                { nom: "Porto", coords: [41.1579, -8.6291] },
                { nom: "Lisbonne", coords: [38.7223, -9.1393] }
            ]
        }
    ];

    // Affichage des voyages
    voyages.forEach(voyage => {
        const points = voyage.etapes.map(e => e.coords);

        // Ligne du voyage
        L.polyline(points, { color: voyage.couleur, weight: 4 }).addTo(map);

        // Marqueurs
        voyage.etapes.forEach((etape, index) => {
            const icon = index === 0 ? startIcon : stepIcon;

            L.marker(etape.coords, { icon })
                .addTo(map)
                .bindPopup(`<b>${voyage.nom}</b><br>${etape.nom}`);
        });
    });
</script>

</body>
</html>
