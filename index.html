<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Globe 3D - Voyages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>

<style>
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    #cesiumContainer {
        position: absolute;
        inset: 0;
    }

    #menuVoyages {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(255,255,255,0.90);
        padding: 10px 14px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        font-family: Arial, sans-serif;
        max-width: 260px;
        max-height: 260px;
        overflow-y: auto;
        z-index: 9999;
    }

    #voyagesList {
        margin-top: 8px;
    }

    .voyage-item {
        display: flex;
        align-items: center;
        margin-bottom: 6px;
        gap: 6px;
        font-size: 13px;
    }

    .miniature {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        object-fit: cover;
        border: 1px solid #ccc;
    }

    .color-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid #333;
        display: inline-block;
    }

    .center-btn {
        cursor: pointer;
        font-size: 16px;
        margin-left: auto;
    }

    /* === Correction popup Cesium : images réduites mais entièrement visibles === */
    .cesium-infoBox-description img {
        max-width: 300px;
        width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
    }

    /* Empêche Cesium de couper le contenu du popup */
    .cesium-infoBox-description {
        overflow: visible !important;
        max-height: none !important;
    }

    /* Affiche correctement les images dans le popup */
    .cesium-infoBox-description img {
        max-width: 300px !important;
        width: 100% !important;
        height: auto !important;
        display: block !important;
        margin: 0 auto !important;
    }

</style>

</head>
<body>

<div id="cesiumContainer"></div>

<div id="menuVoyages">
    <h3 style="margin:0 0 6px 0; color:#2c3e50; font-size:15px; cursor:pointer;" onclick="toggleMenu()">
        📌 Voyages chargés ▼
    </h3>

    <div id="voyagesList"></div>

    <button onclick="cocherTout()" style="margin-top:6px;">Cocher tout</button>
    <button onclick="decocherTout()" style="margin-top:6px;">Décocher tout</button>
</div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4ZTM1MmNkZS0xYTc1LTQ1YTUtYWM5OS00MjgzZmQwMTI5ZDEiLCJpZCI6NDI4ODQ0LCJzdWIiOiJDYXJ5bCIsImlzcyI6Imh0dHBzOi8vaW9uLmNlc2l1bS5jb20iLCJhdWQiOiJDYXJ5bF9kZWZhdWx0IiwiaWF0IjoxNzc4MjU1NjY3fQ.-mKoiaV9CyenZUBr54_v-xo3MLWiWrWWXK7L5_-ZHvE";

// === CHARGEMENT AUTOMATIQUE DES VOYAGES JSON ===
async function chargerVoyages() {
    const fichiers = [
        "tahiti-2025.json",
        "maldives-2014.json"
        // ajoute ici les autres voyages
    ];

    const liste = [];

    for (const f of fichiers) {
        const data = await fetch("voyages/" + f).then(r => r.json());
        liste.push(data);
    }

    return liste;
}

let voyages = [];

chargerVoyages().then(data => {
    voyages = data;

    // Attribuer une couleur harmonieuse à chaque voyage
    voyages.forEach(v => {
        v.couleurVoyage = couleurStableDepuisTexte(v.titre);
    });

    // Construire l’interface
    initialiserInterface();
});


// === COULEURS HARMONIEUSES & STABLES PAR VOYAGE ===
function couleurStableDepuisTexte(texte) {
    let hash = 0;
    for (let i = 0; i < texte.length; i++) {
        hash = texte.charCodeAt(i) + ((hash << 5) - hash);
    }

    const h = Math.abs(hash) % 360; // teinte (0–360)
    const s = 65;                   // saturation %
    const l = 55;                   // luminosité %

    return `hsl(${h}, ${s}%, ${l}%)`;
}


// === INTERFACE : LISTE, MINIATURES, COULEURS ===
    
function initialiserInterface() {
    const listeDiv = document.getElementById("voyagesList");

    voyages.forEach((v, index) => {
        let miniature = v.etapes.find(e => e.photo && e.photo.trim() !== "");
        let img = miniature ? miniature.photo : "https://placehold.co/32x32?text=📍";
        let couleur = v.couleurVoyage || "#3498db";

        const div = document.createElement("div");
        div.className = "voyage-item";

        div.innerHTML = `
            <img src="${img}" class="miniature">
            <span class="color-dot" style="background:${couleur}"></span>
            <label>
                <input type="checkbox" onchange="toggleVoyage(${index}, this.checked)">
                ${v.titre}
            </label>
            <span class="center-btn" onclick="centrerVoyage(${index})">📍</span>
        `;

        listeDiv.appendChild(div);
    });
}


function toggleMenu() {
    const div = document.getElementById("voyagesList");
    div.style.display = div.style.display === "none" ? "block" : "none";
}

function cocherTout() {
    document.querySelectorAll("#voyagesList input[type=checkbox]").forEach((cb, i) => {
        cb.checked = true;
        afficherVoyage(i);
    });
}

function decocherTout() {
    document.querySelectorAll("#voyagesList input[type=checkbox]").forEach((cb, i) => {
        cb.checked = false;
        masquerVoyage(i);
    });
}


// === CESIUM ===
const viewer = new Cesium.Viewer("cesiumContainer", {
    terrain: Cesium.Terrain.fromWorldTerrain(),
    animation: false,
    timeline: false,
    geocoder: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    baseLayerPicker: true,
    infoBox: true
});

viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(8.2275, 46.8182, 2000000)
});


// === ARC 3D ===
function arc3D(lon1, lat1, lon2, lat2, hauteur) {
    const p1 = Cesium.Cartesian3.fromDegrees(lon1, lat1);
    const p2 = Cesium.Cartesian3.fromDegrees(lon2, lat2);

    const cartesians = [];
    const steps = 64;

    for (let i = 0; i <= steps; i++) {
        const t = i / steps;

        const cart = Cesium.Cartesian3.lerp(p1, p2, t, new Cesium.Cartesian3());
        const carto = Cesium.Cartographic.fromCartesian(cart);

        carto.height = Math.sin(Math.PI * t) * hauteur;

        cartesians.push(
            Cesium.Cartesian3.fromRadians(
                carto.longitude,
                carto.latitude,
                carto.height
            )
        );
    }

    return cartesians;
}

function hauteurArcDynamique(lon1, lat1, lon2, lat2) {
    const dLon = Math.abs(lon2 - lon1);
    const dLat = Math.abs(lat2 - lat1);
    const distance = Math.sqrt(dLon * dLon + dLat * dLat);

    let hauteur = distance * 20000000;

    if (hauteur < 150000) hauteur = 150000;
    if (hauteur > 400000) hauteur = 400000;

    return hauteur;
}


// === AFFICHAGE DES VOYAGES ===
function toggleVoyage(index, afficher) {
    if (afficher) afficherVoyage(index);
    else masquerVoyage(index);
}

function afficherVoyage(index) {
    const voyage = voyages[index];
    const groupe = [];

    let last = null;

    voyage.etapes.forEach((etape) => {

        const pos = Cesium.Cartesian3.fromDegrees(etape.lon, etape.lat, 2000);

        const point = viewer.entities.add({
            position: pos,
            point: {
                pixelSize: 12,
                color: Cesium.Color.fromCssColorString(voyage.couleurVoyage),
                outlineColor: Cesium.Color.WHITE,
                outlineWidth: 2
            },
            label: {
                text: etape.nom,
                font: "14px sans-serif",
                fillColor: Cesium.Color.WHITE,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -18),
                disableDepthTestDistance: 0
            },
            description: `
                <h2>${etape.nom}</h2>
                ${etape.photo ? `<img src="${etape.photo}" style="width:100%;border-radius:8px;margin-bottom:10px;">` : ""}
                ${etape.lien ? `<p><a href="${etape.lien}" target="_blank">Lien externe</a></p>` : ""}
            `
        });

        groupe.push(point);

        if (last) {
            let hauteurArc = etape.hauteurArc;

            if (etape.transport === "avion") {
                hauteurArc = hauteurArcDynamique(last.lon, last.lat, etape.lon, etape.lat);
            }
            if (etape.transport === "bateau") hauteurArc = 200;
            if (etape.transport === "marche") hauteurArc = 500;

            const arc = arc3D(last.lon, last.lat, etape.lon, etape.lat, hauteurArc);

            const ligne = viewer.entities.add({
    polyline: {
        positions: arc,
        width: 5, // épaisseur augmentée
        material: new Cesium.PolylineGlowMaterialProperty({
            glowPower: 0.2,
            color: Cesium.Color.fromCssColorString(voyage.couleurVoyage) // couleur du voyage
        }),
        clampToGround: false
    }
});


            groupe.push(ligne);
        }

        last = { lon: etape.lon, lat: etape.lat };
    });

    groupesCesium[index] = groupe;
}

function masquerVoyage(index) {
    if (!groupesCesium[index]) return;

    groupesCesium[index].forEach(entite => {
        viewer.entities.remove(entite);
    });

    groupesCesium[index] = [];
}


// === CENTRAGE PRO ===
function centrerVoyage(index) {
    const voyage = voyages[index];

    let minLon = 999, maxLon = -999;
    let minLat = 999, maxLat = -999;

    voyage.etapes.forEach(e => {
        minLon = Math.min(minLon, e.lon);
        maxLon = Math.max(maxLon, e.lon);
        minLat = Math.min(minLat, e.lat);
        maxLat = Math.max(maxLat, e.lat);
    });

    const centerLon = (minLon + maxLon) / 2;
    const centerLat = (minLat + maxLat) / 2;

    const delta = Math.max(maxLon - minLon, maxLat - minLat);

    let hauteur = 1500000 * (1 + Math.log10(1 + delta * 50));

    if (hauteur < 1500000) hauteur = 1500000;
    if (hauteur > 12000000) hauteur = 12000000;

    viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(centerLon, centerLat, hauteur)
    });
}


// === AFFICHER TOUS LES VOYAGES AU CHARGEMENT ===
document.querySelectorAll("#voyagesList input[type=checkbox]").forEach((cb, i) => {
    cb.checked = true;
    afficherVoyage(i);
});
</script>

</body>
</html>
