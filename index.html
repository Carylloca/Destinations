<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Globe 3D - Voyages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>

    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #menuVoyages {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.85);
            padding: 12px 18px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-family: Arial;
            max-width: 280px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 9999;
        }

        #voyagesList {
            margin-top: 10px;
        }

        .voyage-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 6px;
        }

        .miniature {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #ccc;
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid #333;
            display: inline-block;
            margin-right: 6px;
        }

        .center-btn {
            cursor: pointer;
            font-size: 18px;
            margin-left: auto;
        }
    </style>
</head>
<body>

<!-- 📌 MENU DÉROULANT DES VOYAGES -->
<div id="menuVoyages">
    <h3 style="margin-top:0; color:#2c3e50; cursor:pointer;" onclick="toggleMenu()">
        📌 Voyages chargés ▼
    </h3>

    <div id="voyagesList"></div>

    <button onclick="cocherTout()">Cocher tout</button>
    <button onclick="decocherTout()">Décocher tout</button>
</div>

<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4ZTM1MmNkZS0xYTc1LTQ1YTUtYWM5OS00MjgzZmQwMTI5ZDEiLCJpZCI6NDI4ODQ0LCJzdWIiOiJDYXJ5bCIsImlzcyI6Imh0dHBzOi8vaW9uLmNlc2l1bS5jb20iLCJhdWQiOiJDYXJ5bF9kZWZhdWx0IiwiaWF0IjoxNzc4MjU1NjY3fQ.-mKoiaV9CyenZUBr54_v-xo3MLWiWrWWXK7L5_-ZHvE";

// 🟨🟨🟨 ZONE DE COLLAGE DU CODE DE VOYAGE 🟨🟨🟨

const voyages = [

    {
        "titre": "Ile Maurice 2025 - 2026",
        "couleurVoyage": "#e67e22",
        "etapes": [
            {
                "nom": "Genève aéroport",
                "typeEtape": "depart",
                "transport": "avion",
                "lon": 6.1102707,
                "lat": 46.2313343,
                "photo": "",
                "couleur": "#3498db",
                "hauteurArc": 400000
            },
            {
                "nom": "Aéroport Ile Maurice",
                "typeEtape": "etape",
                "transport": "avion",
                "lon": 57.681484,
                "lat": -20.434035,
                "photo": "",
                "couleur": "#3498db",
                "hauteurArc": 400000
            }
        ]
    }

];

// 🟨🟨🟨 FIN DE LA ZONE DE COLLAGE 🟨🟨🟨


// === INTERFACE : CASES À COCHER + MINIATURES + COULEURS ===

const groupesCesium = [];
const listeDiv = document.getElementById("voyagesList");

voyages.forEach((v, index) => {

    // Trouver une miniature
    let miniature = v.etapes.find(e => e.photo && e.photo.trim() !== "");
    let img = miniature ? miniature.photo : "https://via.placeholder.com/40?text=📍";

    // Couleur du voyage
    let couleur = v.couleurVoyage || "#3498db";

    const div = document.createElement("div");
    div.className = "voyage-item";

    div.innerHTML = `
        <img src="${img}" class="miniature">
        <span class="color-dot" style="background:${couleur}"></span>
        <label>
            <input type="checkbox" onchange="toggleVoyage(${index}, this.checked)">
            ${v.titre}
        </label>
        <span class="center-btn" onclick="centrerVoyage(${index})">📍</span>
    `;

    listeDiv.appendChild(div);
});

// ✔️ Cocher tous les voyages au démarrage
document.querySelectorAll("#voyagesList input[type=checkbox]").forEach((cb, i) => {
    cb.checked = true;
    afficherVoyage(i);
});


// === MENU DÉROULANT ===

function toggleMenu() {
    const div = document.getElementById("voyagesList");
    div.style.display = div.style.display === "none" ? "block" : "none";
}

function cocherTout() {
    document.querySelectorAll("#voyagesList input[type=checkbox]").forEach((cb, i) => {
        cb.checked = true;
        afficherVoyage(i);
    });
}

function decocherTout() {
    document.querySelectorAll("#voyagesList input[type=checkbox]").forEach((cb, i) => {
        cb.checked = false;
        masquerVoyage(i);
    });
}


// === CODE CESIUM ===

const viewer = new Cesium.Viewer("cesiumContainer", {
    terrain: Cesium.Terrain.fromWorldTerrain(),
    animation: false,
    timeline: false,
    geocoder: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    baseLayerPicker: true
});

viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(8.2275, 46.8182, 2000000)
});

const styleEtapes = {
    depart: Cesium.Color.LIME.withAlpha(0.95),
    escale: Cesium.Color.CYAN.withAlpha(0.95),
    etape: Cesium.Color.RED.withAlpha(0.95),
    arrivee: Cesium.Color.ORANGE.withAlpha(0.95)
};

function arc3D(lon1, lat1, lon2, lat2, hauteur) {
    const p1 = Cesium.Cartesian3.fromDegrees(lon1, lat1);
    const p2 = Cesium.Cartesian3.fromDegrees(lon2, lat2);

    const cartesians = [];
    const steps = 64;

    for (let i = 0; i <= steps; i++) {
        const t = i / steps;

        const cart = Cesium.Cartesian3.lerp(p1, p2, t, new Cesium.Cartesian3());
        const carto = Cesium.Cartographic.fromCartesian(cart);

        carto.height = Math.sin(Math.PI * t) * hauteur;

        cartesians.push(
            Cesium.Cartesian3.fromRadians(
                carto.longitude,
                carto.latitude,
                carto.height
            )
        );
    }

    return cartesians;
}


// === AFFICHAGE / SUPPRESSION DES VOYAGES ===

function toggleVoyage(index, afficher) {
    if (afficher) afficherVoyage(index);
    else masquerVoyage(index);
}

function afficherVoyage(index) {
    const voyage = voyages[index];
    const groupe = [];

    let last = null;

    voyage.etapes.forEach((etape) => {
        const pos = Cesium.Cartesian3.fromDegrees(etape.lon, etape.lat, 2000);

        const point = viewer.entities.add({
            position: pos,
            point: {
                pixelSize: 12,
                color: styleEtapes[etape.typeEtape] || Cesium.Color.WHITE,
                outlineColor: Cesium.Color.WHITE,
                outlineWidth: 2
            },
            label: {
                text: etape.nom,
                font: "14px sans-serif",
                fillColor: Cesium.Color.WHITE,
                style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                outlineWidth: 2,
                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                pixelOffset: new Cesium.Cartesian2(0, -18),
                disableDepthTestDistance: Number.POSITIVE_INFINITY
            }
        });

        groupe.push(point);

        if (last) {
            const arc = arc3D(last.lon, last.lat, etape.lon, etape.lat, etape.hauteurArc);

            const ligne = viewer.entities.add({
                polyline: {
                    positions: arc,
                    width: 3,
                    material: new Cesium.PolylineGlowMaterialProperty({
                        glowPower: 0.2,
                        color: Cesium.Color.fromCssColorString(etape.couleur)
                    })
                }
            });

            groupe.push(ligne);
        }

        last = { lon: etape.lon, lat: etape.lat };
    });

    groupesCesium[index] = groupe;
}

function masquerVoyage(index) {
    if (!groupesCesium[index]) return;

    groupesCesium[index].forEach(entite => {
        viewer.entities.remove(entite);
    });

    groupesCesium[index] = [];
}


// === 🌍 CENTRER SUR UN VOYAGE ===

function centrerVoyage(index) {
    const voyage = voyages[index];

    let minLon = 999, maxLon = -999;
    let minLat = 999, maxLat = -999;

    voyage.etapes.forEach(e => {
        minLon = Math.min(minLon, e.lon);
        maxLon = Math.max(maxLon, e.lon);
        minLat = Math.min(minLat, e.lat);
        maxLat = Math.max(maxLat, e.lat);
    });

    const centerLon = (minLon + maxLon) / 2;
    const centerLat = (minLat + maxLat) / 2;

    viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(centerLon, centerLat, 800000)
    });
}

</script>

</body>
</html>
