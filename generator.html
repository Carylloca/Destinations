<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Générateur de voyages CesiumJS</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f7;
        margin: 0;
        padding: 20px;
    }
    h2, h3 {
        color: #2c3e50;
    }
    .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }
    input, select {
        padding: 8px;
        margin: 6px 0;
        width: 300px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    button {
        padding: 10px 20px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover {
        background: #2980b9;
    }
    .etape {
        border: 1px solid #ddd;
        padding: 15px;
        border-radius: 10px;
        margin-top: 10px;
        background: #fafafa;
    }
    textarea {
        width: 100%;
        height: 250px;
        margin-top: 20px;
        border-radius: 10px;
        padding: 10px;
    }
    .preview-map {
        width: 100%;
        height: 200px;
        border-radius: 10px;
        margin-top: 10px;
    }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<h2>🧭 Générateur de voyages CesiumJS</h2>

<div class="card">
    <h3>Informations du voyage</h3>
    <label>Titre du voyage :</label><br>
    <input id="titreVoyage" placeholder="Ex: Voyage en Polynésie 2025"><br>
</div>

<div class="card">
    <h3>Étapes du voyage</h3>
    <div id="etapes"></div>
    <button onclick="ajouterEtape()">➕ Ajouter une étape</button>
    <button onclick="nouveauVoyage()">🆕 Nouveau voyage</button>
</div>

<div class="card">
    <button onclick="genererCode()">🚀 Générer le code du voyage</button>
    <button onclick="copierCode()">📋 Copier le code du voyage</button>
    <button onclick="ouvrirImport()">📥 Importer un voyage</button>

    <h3>Code du voyage :</h3>
    <textarea id="output"></textarea>

    <div id="zoneImport" style="display:none; margin-top:20px;">
        <h3>Importer un voyage :</h3>
        <textarea id="importInput" placeholder="Collez ici le voyage à importer (avec ou sans commentaires DÉBUT/FIN)"></textarea>
        <button onclick="importerVoyage()">🔄 Charger ce voyage</button>
    </div>
</div>

<script>
let compteur = 0;

// Couleurs automatiques selon le type de transport
const couleursTransport = {
    avion: "#3498db",
    bateau: "#1abc9c",
    voiture: "#f1c40f",
    train: "#9b59b6",
    marche: "#2ecc71"
};

// Hauteur des arcs selon le transport
const hauteurTransport = {
    avion: 400000,
    bateau: 20000,
    voiture: 10000,
    train: 15000,
    marche: 5000
};

function ajouterEtape() {
    compteur++;
    const div = document.createElement("div");
    div.className = "etape";

    const id = "map" + compteur;

    div.innerHTML = `
        <h4>Étape ${compteur}</h4>

        <input placeholder="Lieu (ex: Paris CDG)" class="lieu" onblur="rechercherCoordonnees(this)"><br>

        <label>Type d'étape :</label><br>
        <select class="typeEtape">
            <option value="depart">Départ</option>
            <option value="escale">Escale</option>
            <option value="etape">Étape</option>
            <option value="arrivee">Arrivée</option>
        </select><br>

        <label>Transport :</label><br>
        <select class="transport">
            <option value="avion">✈️ Avion</option>
            <option value="bateau">🚢 Bateau</option>
            <option value="voiture">🚗 Voiture</option>
            <option value="train">🚄 Train</option>
            <option value="marche">🚶 Marche</option>
        </select><br>

        <input placeholder="Longitude" class="lon"><br>
        <input placeholder="Latitude" class="lat"><br>

        <input placeholder="Lien externe" class="lien"><br>
        <input placeholder="URL photo" class="photo"><br>

        <div id="${id}" class="preview-map"></div>

        <button onclick="dupliquerEtape(this)">📄 Dupliquer</button>
        <button onclick="supprimerEtape(this)">🗑️ Supprimer</button>
    `;

    document.getElementById("etapes").appendChild(div);

    const map = L.map(id).setView([0, 0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

    div.map = map;
    div.marker = null;

    map.on("dblclick", function(e) {
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;

        div.querySelector(".lat").value = lat;
        div.querySelector(".lon").value = lon;

        if (div.marker) div.map.removeLayer(div.marker);
        div.marker = L.marker([lat, lon]).addTo(div.map);
    });
}

async function rechercherCoordonnees(input) {
    const lieu = input.value;
    const parent = input.closest(".etape");

    if (!lieu) return;

    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(lieu)}`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.length === 0) return;

    const lon = data[0].lon;
    const lat = data[0].lat;

    parent.querySelector(".lon").value = lon;
    parent.querySelector(".lat").value = lat;

    parent.map.setView([lat, lon], 8);

    if (parent.marker) parent.map.removeLayer(parent.marker);
    parent.marker = L.marker([lat, lon]).addTo(parent.map);
}

function genererCode() {
    const titre = document.getElementById("titreVoyage").value;

    const etapesDiv = document.querySelectorAll(".etape");
    let etapes = [];

    etapesDiv.forEach(e => {
        etapes.push({
            nom: e.querySelector(".lieu").value,
            typeEtape: e.querySelector(".typeEtape").value,
            transport: e.querySelector(".transport").value,
            lon: parseFloat(e.querySelector(".lon").value),
            lat: parseFloat(e.querySelector(".lat").value),
            lien: e.querySelector(".lien").value,
            photo: e.querySelector(".photo").value,
            couleur: couleursTransport[e.querySelector(".transport").value],
            hauteurArc: hauteurTransport[e.querySelector(".transport").value]
        });
    });

    const code = `
// ======= DÉBUT DU VOYAGE "${titre}" =======

{
    "titre": "${titre}",
    "etapes": ${JSON.stringify(etapes, null, 4)}
}

// ======= FIN DU VOYAGE "${titre}" =======
`;

    document.getElementById("output").value = code;
}

function copierCode() {
    const textarea = document.getElementById("output");
    textarea.select();
    document.execCommand("copy");
}

function nouveauVoyage(silencieux = false) {
    if (!silencieux) {
        const confirmation = confirm(
            "⚠️ Attention : toutes les informations du voyage en cours vont être perdues.\n\nVoulez-vous continuer ?"
        );
        if (!confirmation) return;
    }

    document.getElementById("titreVoyage").value = "";
    document.getElementById("output").value = "";
    document.getElementById("etapes").innerHTML = "";
    compteur = 0;
}

function supprimerEtape(btn) {
    const etape = btn.closest(".etape");

    const confirmation = confirm("Voulez-vous vraiment supprimer cette étape ?");
    if (!confirmation) return;

    etape.remove();
}

function dupliquerEtape(btn) {
    const etapeOriginale = btn.closest(".etape");

    const clone = etapeOriginale.cloneNode(true);

    compteur++;
    clone.querySelector("h4").textContent = "Étape " + compteur;

    const newMapId = "map" + compteur;
    clone.querySelector(".preview-map").id = newMapId;

    const map = L.map(newMapId).setView([0, 0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

    clone.map = map;
    clone.marker = null;

    map.on("dblclick", function(e) {
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;

        clone.querySelector(".lat").value = lat;
        clone.querySelector(".lon").value = lon;

        if (clone.marker) clone.map.removeLayer(clone.marker);
        clone.marker = L.marker([lat, lon]).addTo(clone.map);
    });

    document.getElementById("etapes").appendChild(clone);
}

function ouvrirImport() {
    document.getElementById("zoneImport").style.display = "block";
}

function importerVoyage() {
    let texte = document.getElementById("importInput").value.trim();

    if (!texte) {
        alert("Veuillez coller un voyage à importer.");
        return;
    }

    // Supprimer les commentaires de type // ...
    texte = texte.replace(/\/\/.*$/gm, "").trim();

    let data;
    try {
        data = JSON.parse(texte);
    } catch (e) {
        alert("Le code collé n'est pas un JSON valide.");
        return;
    }

    // Réinitialiser le générateur sans avertissement
    nouveauVoyage(true);

    document.getElementById("titreVoyage").value = data.titre || "";

    if (!Array.isArray(data.etapes)) {
        alert("Le voyage importé ne contient pas de liste d'étapes valide.");
        return;
    }

    data.etapes.forEach(etape => {
        ajouterEtape();

        const bloc = document.querySelector("#etapes .etape:last-child");

        bloc.querySelector(".lieu").value = etape.nom || "";
        bloc.querySelector(".typeEtape").value = etape.typeEtape || "etape";
        bloc.querySelector(".transport").value = etape.transport || "avion";
        bloc.querySelector(".lon").value = etape.lon ?? "";
        bloc.querySelector(".lat").value = etape.lat ?? "";
        bloc.querySelector(".lien").value = etape.lien || "";
        bloc.querySelector(".photo").value = etape.photo || "";

        if (etape.lat != null && etape.lon != null) {
            bloc.map.setView([etape.lat, etape.lon], 8);
            bloc.marker = L.marker([etape.lat, etape.lon]).addTo(bloc.map);
        }
    });

    alert("Voyage importé avec succès !");
}
</script>

</body>
</html>
